baseURL = 'https://anthonymosleyjr.com'
theme = "hugo-coder"
defaultcontentlanguage = "en"
locale = 'en-us'
title = 'Portfolio'

[pagination]
pagerSize = 20

[markup.highlight]
style = "github-dark"

[params]
  author = "Anthony Mosley Jr."
  info = "Systems Administrator"
  description = "Anthony Mosley Jr's Personal Site"
  keywords = "blog,developer,personal"
  avatarurl = "images/avatar.png"
  #gravatar = "amosley220@outlook.com"

  faviconSVG = "/img/favicon.svg"
  favicon_32 = "/img/favicon-32x32.png"
  favicon_16 = "/img/favicon-16x16.png"

  since = 2024

  enableTwemoji = true

  colorScheme = "auto"
  hidecolorschemetoggle = false

  # customCSS = ["css/custom.css"]
  # customSCSS = ["scss/custom.scss"]
  # customJS = ["js/custom.js"]

[taxonomies]
  category = "categories"
  series = "series"
  tag = "tags"
  author = "authors"


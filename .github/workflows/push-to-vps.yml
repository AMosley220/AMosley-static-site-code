name: Deploy To VPS

on:
    push:
        branches:
            - main
    pull_request:

jobs:
    deploy:
        runs-on: ubuntu-22.04
        concurrency:
          group: ${{ github.workflow }}-${{ github.ref }}
        steps:
          - name: Checkout Repo
            uses: actions/checkout@v4
            with:
              submodules: true  # Fetch Hugo themes (true OR recursive)
              fetch-depth: 0    # Fetch all history for .GitInfo and .Lastmod

          - name: Setup Hugo
            uses: peaceiris/actions-hugo@v3
            with:
              hugo-version: '0.164.0'
              extended: true
          
          - name: Build Hugo
            run: hugo

          - name: Install Hetzner Cloud CLI
            uses: hetznercloud/setup-hcloud@v2
  
          - name: Get IP Addresses
            id: ip
            uses: candidob/get-runner-ip@v1.0.0

          - name: Add current runner IP to hcloud firewall
            run: hcloud firewall add-rule --direction in --source-ips ${{ steps.ip.outputs.ipv4 }}/32 --protocol tcp --port 2222 static-site-firewall
            env:
              HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}

          - name: Copy public folder to vps
            uses: pierrickdelrieu/scp-action@0.1.2
            with:
              host: ${{ secrets.REMOTE_HOST }}
              ssh_port: 2222
              ssh_username: ${{ secrets.REMOTE_USER }}
              ssh_key: ${{ secrets.HETZNER_SSH_KEY }}
              source_dir: './public'
              destination_dir: ${{ secrets.REMOTE_PATH }}
              rm: true

          - name: Remove firewall rule
            run: hcloud firewall delete-rule --direction in --source-ips ${{ steps.ip.outputs.ipv4 }}/32 --protocol tcp --port 2222 static-site-firewall
            env:
              HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }} 